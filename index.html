<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El risala el 3asabiya</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="src/rev.js"></script>
    <script defer src="src/app.js"></script>
</head>
<body>
    <div id="portrait_phone_overlay">
        <h1>
            Rotate your phone.
        </h1>
    </div>
    <header>
        <h1>Machrou3 Fi ouloum hawl el risala el 3asabiya</h1>
    </header>
    <main>
        <div id="ui">
            <span id="bloodsuger"></span>
            <button class="greenbtns" onclick="addSugar(1)">
                +1g/l
            </button>
            <button class="greenbtns"onclick="addSugar(0.1)">
                +0.1g/l
            </button>
            <button class="redbtns" onclick="useSugar(0.1)">
                -0.1g/l
            </button>
            <button class="redbtns" onclick="useSugar(1)">
                -1g/l
            </button>
        </div>
        <div id="dablock">
            <div class="element" id="pancrea">
                <button>
                    <img src="./img/pancrea.png" alt="">
                </button>
                <p>Dis iz da pankrea</p>
            </div>
            <div class="element" id="right_vessel">
                <div id="inc-container">

                </div>
                <button>
                    <img src="./img/blood.png" alt="">
                </button>
                <p>Dis iz da right vesel</p>
            </div>
            <div class="element" id="left_vessel">
                <div id="glu-container">
                    <div class="glu">
                        <span>

                        </span>
                    </div>
                </div>
                <button>
                    <img src="./img/blood.png" alt="">
                </button>
                <p>
                    Dis iz da left vesel
                </p>
            </div>
            <div class="element" id="liver_cell">
                <button>
                    <img src="./img/livercell.png" alt="">
                </button>
                <p>
                    Dis iz da liveur sell
                </p>
            </div>
        </div>
    </main>
</body>
</html>
